<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 人脸识别考勤系统</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 420px;
            width: 100%;
        }
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .login-body {
            padding: 40px;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px;
            font-weight: 600;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #5a6fd6 0%, #6a4190 100%);
            color: white;
        }
        .role-tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        .role-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            color: #666;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        .role-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h2>人脸识别考勤系统</h2>
            <p class="mb-0">Face Recognition Attendance System</p>
        </div>
        <div class="login-body">
            <div class="role-tabs">
                <div class="role-tab active" data-role="teacher">教师登录</div>
                <div class="role-tab" data-role="student">学生登录</div>
            </div>

            <form id="loginForm">
                <input type="hidden" id="loginType" value="teacher">

                <div class="mb-3">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-control" id="username" placeholder="请输入用户名" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
                </div>

                <div class="mb-3" id="studentCodeGroup" style="display: none;">
                    <label class="form-label">学号</label>
                    <input type="text" class="form-control" id="studentCode" placeholder="请输入学号">
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label" for="remember">记住密码</label>
                </div>

                <button type="submit" class="btn btn-login w-100">登 录</button>
            </form>

            <div class="text-center mt-3">
                <a href="/face/capture">人脸注册</a> |
                <a href="/student/checkin">快速签到</a>
            </div>
        </div>
    </div>

    <script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
    <script>
        $(document).ready(function() {
            $('.role-tab').click(function() {
                $('.role-tab').removeClass('active');
                $(this).addClass('active');
                var role = $(this).data('role');
                $('#loginType').val(role);
                if (role === 'student') {
                    $('#studentCodeGroup').show();
                } else {
                    $('#studentCodeGroup').hide();
                }
            });

            $('#loginForm').submit(function(e) {
                e.preventDefault();
                var loginType = $('#loginType').val();
                var username = $('#username').val();
                var password = $('#password').val();

                if (loginType === 'teacher') {
                    window.location.href = '/teacher/dashboard';
                } else {
                    window.location.href = '/student/checkin';
                }
            });
        });
    </script>
</body>
</html>
