<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人脸识别考勤系统 - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
        }
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .login-header h2 {
            margin: 0;
            font-weight: 600;
        }
        .login-body {
            padding: 40px;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px;
            font-weight: 600;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #5a6fd6 0%, #6a4190 100%);
            color: white;
        }
        .user-type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .user-type-selector .btn {
            flex: 1;
        }
        .user-type-selector .btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h2>人脸识别考勤系统</h2>
            <p class="mb-0">Face Recognition Attendance</p>
        </div>
        <div class="login-body">
            <div class="user-type-selector">
                <button class="btn btn-outline-primary active" id="teacherBtn" onclick="setUserType('teacher')">教师</button>
                <button class="btn btn-outline-primary" id="studentBtn" onclick="setUserType('student')">学生</button>
            </div>
            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">用户名</label>
                    <input type="text" class="form-control" id="username" placeholder="请输入用户名" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">密码</label>
                    <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
                </div>
                <input type="hidden" id="userType" value="teacher">
                <div class="d-grid">
                    <button type="submit" class="btn btn-login">登 录</button>
                </div>
            </form>
            <div id="message" class="alert mt-3" style="display: none;"></div>
            <div class="text-center mt-3 text-muted">
                <small>默认密码: admin123 / 123456</small>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let userType = 'teacher';

        function setUserType(type) {
            userType = type;
            $('#userType').val(type);
            if (type === 'teacher') {
                $('#teacherBtn').addClass('active').removeClass('btn-outline-primary');
                $('#studentBtn').removeClass('active').addClass('btn-outline-primary');
            } else {
                $('#studentBtn').addClass('active').removeClass('btn-outline-primary');
                $('#teacherBtn').removeClass('active').addClass('btn-outline-primary');
            }
        }

        $('#loginForm').on('submit', function(e) {
            e.preventDefault();

            const username = $('#username').val();
            const password = $('#password').val();
            const userTypeVal = $('#userType').val();

            $.ajax({
                url: '/login',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    username: username,
                    password: password,
                    user_type: userTypeVal
                }),
                success: function(res) {
                    if (res.success) {
                        $('#message').removeClass('alert-danger').addClass('alert-success').text(res.message).show();
                        setTimeout(function() {
                            window.location.href = res.redirect;
                        }, 500);
                    } else {
                        $('#message').removeClass('alert-success').addClass('alert-danger').text(res.message).show();
                    }
                },
                error: function() {
                    $('#message').removeClass('alert-success').addClass('alert-danger').text('登录失败，请重试').show();
                }
            });
        });
    </script>
</body>
</html>
