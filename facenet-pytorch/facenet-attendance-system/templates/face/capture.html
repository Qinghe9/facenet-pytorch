<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人脸采集 - 人脸识别考勤系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f6fa; }
        .capture-container {
            max-width: 800px;
            margin: 30px auto;
        }
        .video-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        #videoPreview {
            width: 100%;
            border-radius: 10px;
            background: #000;
        }
        #canvasCapture {
            display: none;
        }
        .btn-capture {
            width: 100%;
            padding: 15px;
            font-size: 18px;
        }
        .photo-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }
        .photo-item {
            width: 100px;
            height: 100px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .photo-item .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255,0,0,0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
        .status-pending { background: #ffc107; color: #000; }
        .status-enough { background: #28a745; color: #fff; }
    </style>
</head>
<body>
    <div class="container capture-container">
        <div class="text-center mb-4">
            <h2>人脸采集</h2>
            <p class="text-muted">请采集3-5张不同角度的人脸照片进行注册</p>
        </div>

        <div class="video-card">
            <div class="row">
                <div class="col-md-8">
                    <video id="videoPreview" autoplay playsinline></video>
                    <canvas id="canvasCapture"></canvas>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label class="form-label">采集状态</label>
                        <div id="captureStatus" class="status-badge status-pending">
                            请开始采集 (0/3)
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">已采集照片</label>
                        <div class="photo-gallery" id="photoGallery">
                            <!-- 已采集的照片会显示在这里 -->
                        </div>
                    </div>

                    <button class="btn btn-primary btn-capture mb-3" id="captureBtn" onclick="capturePhoto()">
                        <i class="fas fa-camera"></i> 拍照采集
                    </button>

                    <div class="d-grid gap-2">
                        <button class="btn btn-success" id="registerBtn" onclick="registerFace()" disabled>
                            <i class="fas fa-check"></i> 完成注册
                        </button>
                    </div>

                    <div id="message" class="alert mt-3" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let stream = null;
        let photoCount = 0;
        const photos = [];
        let studentId = null;

        // 初始化摄像头
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480, facingMode: 'user' }
                });
                document.getElementById('videoPreview').srcObject = stream;
            } catch (err) {
                alert('无法访问摄像头: ' + err.message);
                console.error(err);
            }
        }

        // 拍照采集
        function capturePhoto() {
            const video = document.getElementById('videoPreview');
            const canvas = document.getElementById('canvasCapture');
            const ctx = canvas.getContext('2d');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            // 获取base64图片数据
            const imageData = canvas.toDataURL('image/jpeg', 0.9);

            // 获取学生ID
            if (!studentId) {
                // 从session获取当前登录学生ID，或者让用户输入
                studentId = prompt('请输入学生ID进行人脸注册:');
                if (!studentId) return;
            }

            // 发送到服务器
            $.ajax({
                url: '/api/face/upload',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    student_id: parseInt(studentId),
                    image: imageData
                }),
                success: function(res) {
                    if (res.success) {
                        photoCount++;
                        photos.push(imageData);
                        addPhotoToGallery(imageData);
                        updateStatus();

                        if (photoCount >= 3) {
                            $('#registerBtn').prop('disabled', false);
                        }
                    } else {
                        showMessage(res.message, 'danger');
                    }
                },
                error: function() {
                    showMessage('上传失败，请重试', 'danger');
                }
            });
        }

        // 添加照片到相册
        function addPhotoToGallery(imageData) {
            const html = `
                <div class="photo-item">
                    <img src="${imageData}" alt="人脸照片">
                </div>
            `;
            $('#photoGallery').append(html);
        }

        // 更新状态
        function updateStatus() {
            const statusEl = $('#captureStatus');
            if (photoCount >= 3) {
                statusEl.removeClass('status-pending').addClass('status-enough');
                statusEl.text('已采集足够 (' + photoCount + '/5)');
            } else {
                statusEl.text('请继续采集 (' + photoCount + '/3)');
            }
        }

        // 注册人脸
        function registerFace() {
            if (!studentId) {
                showMessage('请先采集人脸照片', 'warning');
                return;
            }

            $.ajax({
                url: '/api/face/register/' + studentId,
                method: 'POST',
                success: function(res) {
                    if (res.success) {
                        showMessage('人脸注册成功！共注册 ' + res.data.face_count + ' 个特征', 'success');
                        setTimeout(function() {
                            window.location.href = '/teacher/students';
                        }, 2000);
                    } else {
                        showMessage(res.message, 'danger');
                    }
                },
                error: function() {
                    showMessage('注册失败，请重试', 'danger');
                }
            });
        }

        // 显示消息
        function showMessage(msg, type) {
            const alert = $('#message');
            alert.removeClass('alert-success alert-danger alert-warning').addClass('alert-' + type);
            alert.text(msg).show();
            setTimeout(function() {
                alert.hide();
            }, 3000);
        }

        // 页面加载时初始化摄像头
        window.onload = initCamera;

        // 页面关闭时关闭摄像头
        window.onbeforeunload = function() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        };
    </script>
</body>
</html>
